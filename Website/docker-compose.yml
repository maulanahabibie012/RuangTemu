# Dev only — Skenario A (butuh Docker Desktop)
# docker compose up -d
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ruangtemu
      POSTGRES_PASSWORD: ruangtemu
      POSTGRES_DB: ruangtemu
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
